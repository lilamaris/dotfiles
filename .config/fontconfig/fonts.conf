<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="autohint" mode="assign"><bool>false</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
  </match>

  <!-- Keep the existing primary choices, then provide CJK/icon fallbacks. -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Maple Mono</family>
      <family>CommitMono Nerd Font</family>
      <family>D2CodingLigature Nerd Font Mono</family>
      <family>D2CodingLigature Nerd Font</family>
      <family>Noto Sans Mono CJK KR</family>
      <family>Noto Sans Mono CJK SC</family>
      <family>Noto Sans Mono CJK TC</family>
      <family>Noto Sans Mono CJK JP</family>
      <family>Source Han Mono KR</family>
      <family>Source Han Mono SC</family>
      <family>Source Han Mono TC</family>
      <family>Source Han Mono JP</family>
      <family>Noto Sans Mono</family>
      <family>Symbols Nerd Font Mono</family>
      <family>Symbols Nerd Font</family>
    </prefer>
  </alias>

  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>CommitMono Nerd Font</family>
      <family>Noto Sans</family>
      <family>D2CodingLigature Nerd Font Propo</family>
      <family>D2CodingLigature Nerd Font</family>
      <family>Noto Sans CJK KR</family>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans CJK TC</family>
      <family>Noto Sans CJK JP</family>
      <family>Source Han Sans KR</family>
      <family>Source Han Sans SC</family>
      <family>Source Han Sans TC</family>
      <family>Source Han Sans JP</family>
      <family>Noto Color Emoji</family>
      <family>Symbols Nerd Font</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>CommitMono Nerd Font</family>
      <family>Noto Serif</family>
      <family>Noto Serif CJK KR</family>
      <family>Noto Serif CJK SC</family>
      <family>Noto Serif CJK TC</family>
      <family>Noto Serif CJK JP</family>
      <family>Source Han Serif KR</family>
      <family>Source Han Serif SC</family>
      <family>Source Han Serif TC</family>
      <family>Source Han Serif JP</family>
      <family>D2CodingLigature Nerd Font Propo</family>
      <family>D2CodingLigature Nerd Font</family>
      <family>Noto Color Emoji</family>
      <family>Symbols Nerd Font</family>
    </prefer>
  </alias>

  <!-- Language-specific fallback order for tagged web content. -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>ko</string></test>
    <edit name="family" mode="append">
      <string>D2CodingLigature Nerd Font Propo</string>
      <string>D2CodingLigature Nerd Font</string>
      <string>Noto Sans CJK KR</string>
      <string>Noto Serif CJK KR</string>
      <string>Source Han Sans KR</string>
      <string>Source Han Serif KR</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-cn</string></test>
    <edit name="family" mode="append">
      <string>Noto Sans CJK SC</string>
      <string>Noto Serif CJK SC</string>
      <string>Source Han Sans SC</string>
      <string>Source Han Serif SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-tw</string></test>
    <edit name="family" mode="append">
      <string>Noto Sans CJK TC</string>
      <string>Noto Serif CJK TC</string>
      <string>Source Han Sans TC</string>
      <string>Source Han Serif TC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-hk</string></test>
    <edit name="family" mode="append">
      <string>Noto Sans CJK HK</string>
      <string>Noto Serif CJK HK</string>
      <string>Noto Sans CJK TC</string>
      <string>Noto Serif CJK TC</string>
      <string>Source Han Sans HC</string>
      <string>Source Han Serif HC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains"><string>zh</string></test>
    <edit name="family" mode="append">
      <string>Noto Sans CJK SC</string>
      <string>Noto Serif CJK SC</string>
      <string>Noto Sans CJK TC</string>
      <string>Noto Serif CJK TC</string>
      <string>Source Han Sans SC</string>
      <string>Source Han Serif SC</string>
      <string>Source Han Sans TC</string>
      <string>Source Han Serif TC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains"><string>ja</string></test>
    <edit name="family" mode="append">
      <string>Noto Sans CJK JP</string>
      <string>Noto Serif CJK JP</string>
      <string>Source Han Sans JP</string>
      <string>Source Han Serif JP</string>
    </edit>
  </match>

  <!-- Catch pages that do not set lang correctly, and keep Nerd Font icons. -->
  <match target="pattern">
    <edit name="family" mode="append">
      <string>D2CodingLigature Nerd Font Propo</string>
      <string>D2CodingLigature Nerd Font</string>
      <string>Noto Sans CJK KR</string>
      <string>Noto Sans CJK SC</string>
      <string>Noto Sans CJK TC</string>
      <string>Noto Sans CJK JP</string>
      <string>Noto Serif CJK KR</string>
      <string>Noto Serif CJK SC</string>
      <string>Noto Serif CJK TC</string>
      <string>Noto Serif CJK JP</string>
      <string>Source Han Sans KR</string>
      <string>Source Han Sans SC</string>
      <string>Source Han Sans TC</string>
      <string>Source Han Sans JP</string>
      <string>Source Han Serif KR</string>
      <string>Source Han Serif SC</string>
      <string>Source Han Serif TC</string>
      <string>Source Han Serif JP</string>
      <string>Noto Color Emoji</string>
      <string>Symbols Nerd Font</string>
      <string>Symbols Nerd Font Mono</string>
    </edit>
  </match>
</fontconfig>
