<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="autohint" mode="assign"><bool>false</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
  </match>

  <!-- Monospace:
        Latin/code: Maple Mono
        Korean/code fallback: D2CodingLigature Nerd Font
        Other CJK fallback: Noto Sans Mono CJK KR/JP/SC/TC/HK
        Icons: Symbols Nerd Font Mono
        Emoji: Noto Color Emoji
  -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Maple Mono</family>
      <family>D2CodingLigature Nerd Font</family>
      <family>Noto Sans Mono CJK KR</family>
      <family>Noto Sans Mono CJK JP</family>
      <family>Noto Sans Mono CJK SC</family>
      <family>Noto Sans Mono CJK TC</family>
      <family>Noto Sans Mono CJK HK</family>
      <family>Symbols Nerd Font Mono</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Korean monospace prefer match -->
  <match target="pattern">
    <test name="family">
      <string>monospace</string>
    </test>
    <test name="lang" compare="contains">
      <string>ko</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>D2CodingLigature Nerd Font</string>
      <string>Noto Sans Mono CJK KR</string>
      <string>D2CodingLigature Nerd Font Mono</string>
    </edit>
  </match>

  <!-- Sans-serif:
      Latin: Noto Sans
      Korean/CJK fallback: Noto Sans CJK
      Emoji: Noto Color Emoji
  -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Sans CJK KR</family>
      <family>Noto Sans CJK JP</family>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans CJK TC</family>
      <family>Noto Sans CJK HK</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Serif:
       Documents/web serif: Noto Serif
       Korean/CJK fallback: Noto Serif CJK
       Emoji last.
  -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Noto Serif CJK KR</family>
      <family>Noto Serif CJK JP</family>
      <family>Noto Serif CJK SC</family>
      <family>Noto Serif CJK TC</family>
      <family>Noto Serif CJK HK</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Locale-specific generic family preferences.
       Use prepend_first because aliases are already expanded before normal prepend edits. -->
  <match target="pattern">
    <test name="family">
      <string>monospace</string>
    </test>
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Sans Mono CJK JP</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>sans-serif</string>
    </test>
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>serif</string>
    </test>
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Serif CJK JP</string>
    </edit>
  </match>

  <!-- Chinese locale preferences use eq to avoid zh matching every regional variant. -->
  <match target="pattern">
    <test name="family">
      <string>monospace</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Sans Mono CJK SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>sans-serif</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Sans CJK SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>serif</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Serif CJK SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>monospace</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh-cn</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Sans Mono CJK SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>sans-serif</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh-cn</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Sans CJK SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>serif</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh-cn</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Serif CJK SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>monospace</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh-sg</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Sans Mono CJK SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>sans-serif</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh-sg</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Sans CJK SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>serif</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh-sg</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Serif CJK SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>monospace</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh-tw</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Sans Mono CJK TC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>sans-serif</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh-tw</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Sans CJK TC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>serif</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh-tw</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Serif CJK TC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>monospace</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh-hk</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Sans Mono CJK HK</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>sans-serif</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh-hk</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Sans CJK HK</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>serif</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh-hk</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Serif CJK HK</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>monospace</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh-mo</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Sans Mono CJK HK</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>sans-serif</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh-mo</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Sans CJK HK</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family">
      <string>serif</string>
    </test>
    <test name="lang" compare="eq">
      <string>zh-mo</string>
    </test>
    <edit name="family" mode="prepend_first">
      <string>Noto Serif CJK HK</string>
    </edit>
  </match>


  <!-- Korean content -->
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>ko</string>
    </test>
    <edit name="family" mode="append">
      <string>Noto Sans CJK KR</string>
      <string>Noto Serif CJK KR</string>
      <string>Noto Sans Mono CJK KR</string>
    </edit>
  </match>

  <!-- Japanese content -->
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <edit name="family" mode="append">
      <string>Noto Sans CJK JP</string>
      <string>Noto Serif CJK JP</string>
      <string>Noto Sans Mono CJK JP</string>
    </edit>
  </match>

  <!-- Simplified Chinese content -->
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-cn</string>
    </test>
    <edit name="family" mode="append">
      <string>Noto Sans CJK SC</string>
      <string>Noto Serif CJK SC</string>
      <string>Noto Sans Mono CJK SC</string>
    </edit>
  </match>

  <!-- Traditional Chinese content -->
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-tw</string>
    </test>
    <edit name="family" mode="append">
      <string>Noto Sans CJK TC</string>
      <string>Noto Serif CJK TC</string>
      <string>Noto Sans Mono CJK TC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-hk</string>
    </test>
    <edit name="family" mode="append">
      <string>Noto Sans CJK HK</string>
      <string>Noto Serif CJK HK</string>
      <string>Noto Sans CJK TC</string>
      <string>Noto Serif CJK TC</string>
    </edit>
  </match>

  <!-- Generic Chinese fallback when region is missing -->
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh</string>
    </test>
    <edit name="family" mode="append">
      <string>Noto Sans CJK SC</string>
      <string>Noto Serif CJK SC</string>
      <string>Noto Sans CJK TC</string>
      <string>Noto Serif CJK TC</string>
    </edit>
  </match>

  <!-- Keep emoji available globally, but do not globally append every CJK and Nerd font. -->
  <match target="pattern">
    <edit name="family" mode="append">
      <string>Noto Color Emoji</string>
    </edit>
  </match>
</fontconfig>
